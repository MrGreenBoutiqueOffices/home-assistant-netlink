---
name: Release

on:
  release:
    types:
      - published

jobs:
  release:
    name: Release integration
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v6.0.2
      - name: 🔢 Adjust version number
        shell: bash
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version,,}"
          version="${version#v}"
          yq e -P -o=json \
            -i ".version = \"${version}\"" \
            "${{ github.workspace }}/custom_components/netlink/manifest.json"
      - name: 📦 Created zipped release package
        shell: bash
        run: |
          cd "${{ github.workspace }}/custom_components/netlink"
          zip netlink.zip -r ./
      - name: 🔏 Sign release package
        uses: sigstore/gh-action-sigstore-python@v3.2.0
        with:
          inputs: ${{ github.workspace }}/custom_components/netlink/netlink.zip
      - name: ⬆️ Upload zip to release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: ${{ github.workspace }}/custom_components/netlink/netlink.zip
